{% extends "file/base.html" %}

{% block title %}{{ display_name }} - Djancloud{% endblock %}

{% block body %}
<div class="flex h-full min-h-screen flex-col">

    {% include "file/_navbar.html" with active_nav='files' %}

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 flex flex-col overflow-hidden" style="background: #1e1e1e;">

            <!-- Toolbar -->
            <div class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <button onclick="history.back()"
                            class="rounded-lg border border-gray-300 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-100 transition-colors">
                        <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back
                    </button>
                    <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <h1 class="text-sm font-medium text-gray-900 truncate">{{ display_name }}</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="zoomOut()" class="rounded p-1.5 text-gray-600 hover:text-gray-900 hover:bg-gray-100" title="Zoom out">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/>
                        </svg>
                    </button>
                    <span id="zoom-level" class="text-xs text-gray-600 min-w-[3rem] text-center">100%</span>
                    <button onclick="zoomIn()" class="rounded p-1.5 text-gray-600 hover:text-gray-900 hover:bg-gray-100" title="Zoom in">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"/>
                        </svg>
                    </button>
                    <button onclick="zoomFit()" class="rounded p-1.5 text-gray-600 hover:text-gray-900 hover:bg-gray-100" title="Fit to screen">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                        </svg>
                    </button>
                    <div class="w-px h-5 bg-gray-200 mx-1"></div>
                    <a href="{% url 'download_file' file_id=file.id %}"
                       class="inline-flex items-center gap-1 rounded-lg bg-brand-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-brand-700 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        Download
                    </a>
                </div>
            </div>

            <!-- Image container -->
            <div id="image-container" class="flex-1 overflow-auto flex items-center justify-center p-4" style="background: #2d2d2d;">
                <img id="preview-image"
                     src="{% url 'preview_file' file_id=file.id %}?raw=1"
                     alt="{{ display_name }}"
                     class="max-w-none shadow-2xl"
                     style="cursor: grab;"
                     onload="zoomFit()">
            </div>

        </main>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var zoom = 100;
var img = document.getElementById('preview-image');
var container = document.getElementById('image-container');

function updateZoom() {
    img.style.width = zoom + '%';
    img.style.maxWidth = '';
    img.style.maxHeight = '';
    document.getElementById('zoom-level').textContent = zoom + '%';
}

function zoomIn() {
    zoom = Math.min(zoom + 25, 500);
    updateZoom();
}

function zoomOut() {
    zoom = Math.max(zoom - 25, 10);
    updateZoom();
}

function zoomFit() {
    img.style.width = '';
    img.style.maxWidth = '100%';
    img.style.maxHeight = (container.clientHeight - 32) + 'px';
    zoom = Math.round((img.clientWidth / img.naturalWidth) * 100) || 100;
    document.getElementById('zoom-level').textContent = zoom + '%';
}

container.addEventListener('wheel', function(e) {
    if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        if (e.deltaY < 0) zoomIn();
        else zoomOut();
    }
}, { passive: false });

img.addEventListener('dblclick', function() {
    if (zoom === 100) {
        zoomFit();
    } else {
        zoom = 100;
        updateZoom();
    }
});
</script>
{% endblock %}
