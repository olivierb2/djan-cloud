{% extends "file/base.html" %}

{% block title %}{{ display_name }} - Djancloud{% endblock %}

{% block body %}
<div class="flex h-full min-h-screen flex-col">

    {% include "file/_navbar.html" with active_nav='files' %}

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 flex flex-col overflow-hidden">

            <!-- Toolbar -->
            <div class="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-200 shadow-sm">
                <div class="flex items-center gap-3">
                    <button onclick="history.back()"
                            class="rounded-lg border border-gray-300 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-100 transition-colors">
                        <svg class="w-4 h-4 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        Back
                    </button>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <h1 class="text-sm font-medium text-gray-900 truncate">{{ display_name }}</h1>
                </div>
                <div class="flex items-center gap-2">
                    <a href="{% url 'download_file' file_id=file.id %}"
                       class="inline-flex items-center gap-1 rounded-lg bg-brand-600 px-3 py-1.5 text-xs font-medium text-white hover:bg-brand-700 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        Download
                    </a>
                </div>
            </div>

            <!-- Text content -->
            <div class="flex-1 overflow-auto bg-gray-50">
                <div class="max-w-4xl mx-auto p-4 lg:p-6">
                    <div class="rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden">
                        <pre class="p-4 text-sm leading-relaxed text-gray-800 overflow-x-auto">{{ text_content }}</pre>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>
{% endblock %}
